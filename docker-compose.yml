services:
  app:
    build: .
    container_name: web-pencarian-buku-app
    ports:
      - "3500:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=websiteskripsi
      - BASE_URL=http://localhost:3500/
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: web-pencarian-buku-db
    restart: always
    environment:
      MYSQL_DATABASE: websiteskripsi
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: web-pencarian-buku-pma
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  db_data:
